<div class="bg-surface-container-lowest rounded-2xl overflow-hidden group hover:-translate-y-2 transition-all duration-500 shadow-sm">
    <div class="h-64 overflow-hidden">
        <img alt="{{ title }}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="{{ image }}">
    </div>
    <div class="p-8">
        <h3 class="text-2xl text-primary mb-2">{{ title }}</h3>
        <p class="text-on-surface-variant mb-6 text-sm">{{ desc }}</p>
        <div class="space-y-3 mb-8">
            <div class="flex justify-between items-center py-2 border-b border-outline-variant/30">
                <span class="text-on-surface-variant">Stay Only</span>
                <span class="font-bold text-primary">₹1000</span>
            </div>
            <div class="flex justify-between items-center py-2">
                <span class="text-on-surface-variant">Stay + Experience</span>
                <span class="font-bold text-primary">₹2000</span>
            </div>
        </div>
        <a class="block w-full py-3 rounded-lg border border-primary text-primary font-semibold hover:bg-primary hover:text-on-primary transition-colors text-center" href="{% url 'pages:contact' %}">Book Tent</a>
    </div>
</div>
